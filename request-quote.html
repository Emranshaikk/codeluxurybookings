<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Enhancements -->
    <meta name="keywords" content="request quote, elite luxury bookings, private jet charter">
    <link rel="publisher" href="https://eliteluxurybookings.com/">

    <title>Request Your Private Jet Quote | Elite Luxury Bookings</title>
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Meta Pixel & GA4 -->
    <!-- [Standard Tracking Code Here] -->

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { background: var(--dark-bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .quote-panel { width: 100%; max-width: 500px; background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); padding: 4rem; border-radius: 40px; text-align: center; }
        .gold-text { color: var(--primary-gold); }
        .serif { font-family: 'Cormorant Garamond', serif; }

        .form-control { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 1.2rem; border-radius: 12px; color: #fff; margin-bottom: 1.5rem; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary-gold); }

        .btn-gold { width: 100%; background: var(--primary-gold); color: #000; padding: 1.2rem; border-radius: 100px; border: none; font-weight: 700; cursor: pointer; transition: 0.4s; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(212,175,55,0.3); }

        .trust-badges { display: flex; justify-content: center; gap: 1.5rem; margin-top: 2rem; opacity: 0.5; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .back-home { position: absolute; top: 2rem; left: 2rem; color: var(--text-muted); text-decoration: none; font-size: 0.8rem; }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Elite Luxury Bookings",
      "url": "https://eliteluxurybookings.com",
      "logo": "https://eliteluxurybookings.com/favicon.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+918801079030",
        "contactType": "Concierge Customer Service",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Request Your Private Jet Quote | Elite Luxury Bookings">
    <meta property="og:description" content="We curate world-class luxury experiences: Private Jets, Luxury Yachts, and Exclusive Villas.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://eliteluxurybookings.com/request-quote/">
    <meta property="og:image" content="https://eliteluxurybookings.com/assets/elite_jet_master_hero.png">
    <meta property="og:site_name" content="Elite Luxury Bookings">
</head>
<body>
    <a href="https://eliteluxurybookings.com/" class="back-home">← Back to Site</a>

    <div class="quote-panel">
        <h1 class="serif" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Secure Your <span class="gold-text">Mission</span></h1>
        <p style="color: rgba(255,255,255,0.6); margin-bottom: 3rem; font-size: 0.9rem;">Submit your flight details for immediate aircraft sourcing and competitive jet quotes.</p>

        <form action="https://formspree.io/f/xwvwanlj" method="POST">
            <input type="hidden" name="_redirect" value="https://eliteluxurybookings.com/thank-you.html">
            <input type="hidden" name="form_type" value="Pixel Page Direct">
            <input type="text" name="name" placeholder="Full Name" class="form-control" required>
            <input type="email" name="email" placeholder="Private Email" class="form-control" required>
            <input type="tel" name="phone" placeholder="WhatsApp / Phone" class="form-control" required>
            <input type="text" name="route" placeholder="Departure & Destination" class="form-control" required>
            
            <button type="submit" class="btn-gold">Get Instant Pricing</button>
        </form>

        <div class="trust-badges">
            <span>🛡️ ARG/US Platinum</span>
            <span>✅ Wyvern Certified</span>
            <span>🔒 SSL Secured</span>
        </div>
    </div>
</body>
</html>
