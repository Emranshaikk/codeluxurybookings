<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->

    <script>

      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-J56D1LJLFM');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Experience Not Found | Elite Luxury Bookings</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-black: #050505;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--deep-black);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 8rem;
            margin: 0;
            color: var(--primary-gold);
            line-height: 1;
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .btn {
            display: inline-block;
            padding: 1.2rem 2.5rem;
            background: var(--primary-gold);
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <h2>Destination Unknown</h2>
        <p>The exclusive experience you are looking for has moved or does not exist. Our concierge is ready to guide
            you back.</p>
        <a href="/" class="btn">Return to Homepage</a>
    </div>
</body>

</html>
