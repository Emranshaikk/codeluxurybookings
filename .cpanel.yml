---
deployment:
  tasks:
    # 1. Remove any lingering WordPress files (safe on repeat runs)
    - rm -rf /home/ccgaumtb/public_html/wp-admin
    - rm -rf /home/ccgaumtb/public_html/wp-includes
    - rm -rf /home/ccgaumtb/public_html/wp-content
    - rm -f /home/ccgaumtb/public_html/index.php
    - rm -f /home/ccgaumtb/public_html/wp-login.php
    - rm -f /home/ccgaumtb/public_html/wp-cron.php
    - rm -f /home/ccgaumtb/public_html/wp-trackback.php
    - rm -f /home/ccgaumtb/public_html/xmlrpc.php
    - rm -f /home/ccgaumtb/public_html/license.txt
    - rm -f /home/ccgaumtb/public_html/readme.html
    - rm -f /home/ccgaumtb/public_html/old_blog.html

    # 2. Deploy static site files
    - /bin/cp -RV * /home/ccgaumtb/public_html
    - /bin/cp -V .htaccess /home/ccgaumtb/public_html
    - echo "Elite Luxury Bookings - Deployment Complete."
