    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #050505;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('/assets/thank-you-bg.png') center/cover no-repeat;
            z-index: -1;
        }

        .thank-you-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 4rem;
            max-width: 700px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .serif {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        .gold-text { color: var(--primary-gold); }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: rgba(212, 175, 55, 0.15);
            color: var(--primary-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.4s ease;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-gold {
            background: var(--primary-gold);
            color: #000;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.5);
        }

        .next-steps {
            margin-top: 3.5rem;
            padding-top: 2.5rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            gap: 3rem;
        }

        .step {
            text-align: left;
        }

        .step span {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--primary-gold);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .step p {
            font-size: 0.95rem;
            margin-bottom: 0;
            color: #fff;
        }

        @media (max-width: 600px) {
            .thank-you-card { padding: 3rem 1.5rem; }
            h1 { font-size: 2.5rem; }
            .next-steps { flex-direction: column; gap: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <div class="thank-you-card">
        <div class="check-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
                <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z"/>
            </svg>
        </div>
        
        <h1 class="serif">Request <span class="gold-text">Confirmed</span></h1>
        <p>Our flight operations team has been notified. You will receive your personalized jet itineraries via WhatsApp/Email shortly.</p>
        
        <a href="/" class="btn btn-gold">Return to Home</a>

        <div class="next-steps">
            <div class="step">
                <span>Phase 1</span>
                <p>Aircraft Sourcing</p>
            </div>
            <div class="step">
                <span>Phase 2</span>
                <p>Price Analysis</p>
            </div>
            <div class="step">
                <span>Phase 3</span>
                <p>Itinerary Delivery</p>
            </div>
        </div>
    </div>
</body>
</html>
